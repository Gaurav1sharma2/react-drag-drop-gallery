name: Accessibility and Form Validation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run LoginPage tests
      run: npm test -- --testPathPattern="LoginPage.test.js$" --coverage --watchAll=false
    
    - name: Run GalleryPage drag-drop tests
      run: npm test -- --testPathPattern="GalleryPage.test.js$" --coverage --watchAll=false
    
    - name: Comprehensive Accessibility Checks
      run: |
        echo "=========================================="
        echo "COMPREHENSIVE ACCESSIBILITY AUDIT"
        echo "=========================================="
        echo ""
        
        echo "1️⃣  INPUT ELEMENTS ACCESSIBILITY"
        echo "---"
        echo "Checking for <input> elements with type attribute..."
        grep -r '<input' src/pages/ && echo "✓ input elements found" || echo "⚠ Warning: No input elements found"
        echo ""
        
        echo "Checking for aria-required on inputs..."
        grep -r "aria-required" src/pages/ && echo "✓ aria-required on inputs found" || echo "⚠ Warning: No aria-required on inputs"
        echo ""
        
        echo "Checking for aria-invalid on inputs..."
        grep -r "aria-invalid" src/pages/ && echo "✓ aria-invalid on inputs found" || echo "⚠ Warning: No aria-invalid on inputs"
        echo ""
        
        echo "Checking for aria-describedby on inputs..."
        grep -r "aria-describedby" src/pages/ && echo "✓ aria-describedby on inputs found" || echo "⚠ Warning: No aria-describedby on inputs"
        echo ""
        
        echo "2️⃣  LABEL ELEMENTS ACCESSIBILITY"
        echo "---"
        echo "Checking for <label> elements with htmlFor..."
        grep -r "htmlFor=" src/pages/ && echo "✓ labels with htmlFor found" || echo "⚠ Warning: No htmlFor labels found"
        echo ""
        
        echo "3️⃣  BUTTON ELEMENTS ACCESSIBILITY"
        echo "---"
        echo "Checking for <button> elements..."
        grep -r "<button" src/pages/ && echo "✓ button elements found" || echo "⚠ Warning: No button elements found"
        echo ""
        
        echo "Checking for aria-label on buttons..."
        grep -r "aria-label.*button\|<button.*aria-label" src/pages/ && echo "✓ aria-label on buttons found" || echo "⚠ Warning: Check if buttons have aria-label or visible text"
        echo ""
        
        echo "4️⃣  IMAGE ELEMENTS ACCESSIBILITY"
        echo "---"
        echo "Checking for <img> elements..."
        grep -r "<img" src/pages/ && echo "✓ img elements found" || echo "ℹ️  No img elements (not required for this page)"
        echo ""
        
        echo "Checking for alt attribute on images..."
        grep -r 'alt="' src/pages/ && echo "✓ alt attributes on images found" || echo "ℹ️  No alt attributes (check if images exist)"
        echo ""
        
        echo "5️⃣  LINK ELEMENTS ACCESSIBILITY"
        echo "---"
        echo "Checking for <a> elements..."
        grep -r "<a" src/pages/ && echo "✓ link elements found" || echo "ℹ️  No link elements (not required for this page)"
        echo ""
        
        echo "Checking for aria-label on links..."
        grep -r "aria-label.*href\|<a.*aria-label" src/pages/ && echo "✓ aria-label on links found" || echo "ℹ️  Check if links have aria-label or visible text"
        echo ""
        
        echo "6️⃣  FORM ELEMENTS ACCESSIBILITY"
        echo "---"
        echo "Checking for <form> elements..."
        grep -r "<form" src/pages/ && echo "✓ form elements found" || echo "⚠ Warning: No form elements found"
        echo ""
        
        echo "Checking for aria-label on form..."
        grep -r "aria-label.*form\|<form.*aria-label" src/pages/ && echo "✓ aria-label on form found" || echo "⚠ Warning: Form should have aria-label"
        echo ""
        
        echo "7️⃣  SEMANTIC HTML & ROLES"
        echo "---"
        echo "Checking for heading hierarchy (h1-h6)..."
        grep -r "<h[1-6]" src/pages/ && echo "✓ heading elements found" || echo "⚠ Warning: No heading elements found"
        echo ""
        
        echo "Checking for role attributes..."
        grep -r "role=" src/pages/ && echo "✓ role attributes found" || echo "ℹ️  No role attributes (may not be needed)"
        echo ""
        
        echo "8️⃣  ERROR HANDLING ACCESSIBILITY"
        echo "---"
        echo "Checking for role='alert' on error messages..."
        grep -r 'role="alert"' src/pages/ && echo "✓ alert role on error messages found" || echo "⚠ Warning: Error messages should have role='alert'"
        echo ""
        
        echo "9️⃣  DRAG & DROP ACCESSIBILITY"
        echo "---"
        echo "Checking for draggable elements..."
        grep -r "draggable" src/pages/ && echo "✓ draggable elements found" || echo "ℹ️  No draggable elements (not required for this page)"
        echo ""
        
        echo "Checking for drag event handlers..."
        grep -r "onDragStart\|onDragOver\|onDrop\|onDragEnd" src/pages/ && echo "✓ drag event handlers found" || echo "ℹ️  No drag event handlers (not required for this page)"
        echo ""
        
        echo "Checking for alt attributes on gallery images..."
        grep -r 'alt=' src/pages/ && echo "✓ alt attributes on images found" || echo "⚠ Warning: Gallery images should have alt text"
        echo ""
        
        echo "Checking for aria-label or title on draggable items..."
        grep -r "aria-label.*drag\|draggable.*aria-label\|title=" src/pages/ && echo "✓ aria-label/title on draggable items found" || echo "ℹ️  Consider adding aria-label to draggable items for better accessibility"
        echo ""
        
        echo "Checking for instructions text..."
        grep -r "instruction\|drag.*drop\|reorder" src/pages/ && echo "✓ instructions for drag-drop found" || echo "⚠ Warning: Add instructions for drag-drop functionality"
        echo ""
        
        echo "=========================================="
        echo "✅ Accessibility audit completed!"
        echo "=========================================="
    
    - name: Check HTML accessibility with Pa11y
      run: |
        npm install -g pa11y-ci
        npm run build --if-present
        pa11y-ci --config .pa11yci.json || echo "Accessibility check completed with warnings"
      continue-on-error: true
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: accessibility-tests
        name: accessibility-coverage
        fail_ci_if_error: false
